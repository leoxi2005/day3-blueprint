<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DAY3 · WALL</title>
    <style>
      html, body { margin: 0; padding: 0; background: #05070f; overflow: hidden; }
      * { box-sizing: border-box; }

      /* Blueprints + Drafting */
      @keyframes floaty {
        0%   { transform: translate(0,0) rotate(-1.8deg); }
        25%  { transform: translate(20px,-34px) rotate(1.4deg); }
        50%  { transform: translate(5px,-58px) rotate(2.2deg); }
        75%  { transform: translate(-20px,-28px) rotate(-1.1deg); }
        100% { transform: translate(0,0) rotate(-1.8deg); }
      }
      @keyframes glowbreathe { 0%,100%{opacity:.38;} 50%{opacity:.62;} }
      @keyframes bpflow { to{stroke-dashoffset:-33;} }
      @keyframes bpdrift { 0%,100%{transform:translate(0,0);} 50%{transform:translate(5px,-4px);} }
      @keyframes bppulse { 0%,100%{opacity:.3;} 50%{opacity:.85;} }
      @keyframes bpblink { 0%,100%{opacity:.35;} 50%{opacity:1;} }
      @keyframes bpscan { 0%{transform:translateY(0);opacity:0;} 14%{opacity:.8;} 86%{opacity:.8;} 100%{transform:translateY(200px);opacity:0;} }
      @keyframes spin { to{transform:rotate(360deg);} }

      /* Ascension */
      @keyframes tickdraw { 0%{stroke-dashoffset:26;} 60%{stroke-dashoffset:0;} 100%{stroke-dashoffset:0;} }
      @keyframes rise {
        0%{transform:translate(0,0) scale(1);opacity:0;}
        8%{opacity:1;}
        54%{transform:translate(calc(var(--dx)*.58), calc(var(--dy)*.58)) scale(.6);opacity:.96;}
        86%{transform:translate(calc(var(--dx)*.93), calc(var(--dy)*.93)) scale(.2);opacity:.4;}
        100%{transform:translate(var(--dx), var(--dy)) scale(.05);opacity:0;}
      }
      @keyframes spinrev { to{transform:rotate(-360deg);} }
      @keyframes pulsering { 0%{transform:translate(-50%,-50%) scale(.55);opacity:.7;} 100%{transform:translate(-50%,-50%) scale(2.3);opacity:0;} }
      @keyframes corebreatheG { 0%,100%{box-shadow:0 0 70px rgba(241,200,117,.5),0 0 150px rgba(241,200,117,.28),inset 0 0 50px rgba(241,200,117,.4);} 50%{box-shadow:0 0 110px rgba(241,200,117,.72),0 0 210px rgba(241,200,117,.42),inset 0 0 70px rgba(241,200,117,.58);} }
      @keyframes arrowup { 0%{transform:translateY(6px);opacity:.45;} 50%{transform:translateY(-6px);opacity:1;} 100%{transform:translateY(6px);opacity:.45;} }
      @keyframes beamflow { 0%{background-position:0 0;} 100%{background-position:0 -240px;} }
      @keyframes dotblink { 0%,100%{opacity:.25;} 50%{opacity:1;} }
      @keyframes auroradrift { 0%{transform:translate(-4%,0) rotate(0deg);} 50%{transform:translate(4%,-2%) rotate(8deg);} 100%{transform:translate(-4%,0) rotate(0deg);} }
      @keyframes bloomG { 0%,100%{opacity:.5;transform:translate(-50%,-50%) scale(1);} 50%{opacity:.9;transform:translate(-50%,-50%) scale(1.14);} }
      @keyframes colpulse { 0%,100%{opacity:.75;} 50%{opacity:1;} }
      @keyframes sceneIn { from{opacity:0;} to{opacity:1;} }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>

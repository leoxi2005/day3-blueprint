name: Build Windows EXE

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-win:
    # windows-2022 có Visual Studio 2022 (node-gyp nhận được; windows-latest đã lên VS2026 quá mới)
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # node-gyp 9.4.1 (grandiose) hỏng với Python 3.12 → ép Python 3.11
      - uses: actions/setup-python@v5
        id: py
        with:
          python-version: '3.11'

      - name: Install deps (compile NDI native)
        run: npm install
        env:
          npm_config_python: ${{ steps.py.outputs.python-path }}

      - name: Typecheck
        run: npm run typecheck

      - name: Build + package Windows .exe
        run: npm run dist:win

      - name: Upload .exe
        uses: actions/upload-artifact@v4
        with:
          name: DAY3-BLUEPRINT-windows
          path: dist/*.exe
          if-no-files-found: error

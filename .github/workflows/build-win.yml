name: Build Windows EXE

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-win:
    # windows-2022 có Visual Studio 2022 (node-gyp nhận được; windows-latest đã lên VS2026 quá mới)
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install deps (compile NDI native)
        run: npm install

      - name: Typecheck
        run: npm run typecheck

      - name: Build + package Windows .exe
        run: npm run dist:win

      - name: Upload .exe
        uses: actions/upload-artifact@v4
        with:
          name: DAY3-BLUEPRINT-windows
          path: dist/*.exe
          if-no-files-found: error
